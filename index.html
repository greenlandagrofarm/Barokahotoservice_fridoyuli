<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGINE PRO - Workshop System Integration</title>
    <style>
        /* Menghilangkan margin bawaan browser dan mengunci ukuran layar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pembungkus iframe agar responsif dan penuh layar */
        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Overlay Indikator Koneksi / Memuat Ulang */
        .loading-koneksi-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-koneksi-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Spinner Animasi */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-bottom-color: #1E3A8A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Teks Status Sesuai Request */
        .status-text {
            font-size: 14px;
            font-weight: 800;
            color: #1E3A8A;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .sub-status-text {
            font-size: 11px;
            font-weight: 600;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <!-- Overlay Status Pemuatan Jaringan ENGINE PRO -->
    <div id="connection-overlay" class="loading-koneksi-overlay">
        <div class="spinner"></div>
        <div class="status-text">Memuat ENGINE PRO...</div>
        <div id="sub-text" class="sub-status-text">Refresh jika koneksi terputus</div>
    </div>

    <div class="iframe-container">
        <!-- Iframe Utama ENGINE PRO -->
        <iframe 
            id="engine-pro-iframe"
            src="https://script.google.com/macros/s/AKfycby7OehEol_qQK5WJL7MA90FlgV8GjweFM_yp3m_EdtNWBNR8PsQbEn06MXbb9cwjMyC8w/exec" 
            title="Carboard Servis Dashboard Overview"
            allow="geolocation; microphone; camera; midi; encrypted-media;"
            loading="lazy">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('engine-pro-iframe');
        const overlay = document.getElementById('connection-overlay');
        const subText = document.getElementById('sub-text');

        // 1. Deteksi saat internet terputus (Offline)
        window.addEventListener('offline', () => {
            console.warn('Koneksi terputus!');
            subText.innerText = "Koneksi Terputus! Hubungkan internet kembali";
            overlay.classList.add('active');
        });

        // 2. Deteksi saat internet terhubung kembali (Online) -> Auto-Refresh & Tampilkan Teks Pemuatan
        window.addEventListener('online', () => {
            console.log('Koneksi online kembali. Memuat ulang...');
            subText.innerText = "Refresh jika koneksi terputus";
            overlay.classList.add('active');
            
            if (iframe) {
                // Refresh src iframe secara background
                iframe.src = iframe.src;
            }
        });

        // 3. Sembunyikan layar memuat/loading setelah iframe sukses ter-load sempurna
        if (iframe) {
            iframe.addEventListener('load', () => {
                overlay.classList.remove('active');
            });
        }
    </script>
</body>
</html>
